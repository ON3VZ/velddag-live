<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Field Day Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <div class="topbar-brand">
    <span class="logo-wld" aria-label="WLD">WLD</span>
    <div class="logo-sep" aria-hidden="true"></div>
    <div class="topbar-main">
      <h1 id="fd-name">Field Day Tracker</h1>
      <div class="topbar-sub">
        <span id="fd-callsign" class="mono"></span>
        <span id="fd-period"></span>
      </div>
    </div>
  </div>
  <div class="topbar-actions">
    <button id="manual-open" class="manage-btn secondary-btn" data-i18n="manual.open">Handleiding</button>
    <button id="manage-open" class="manage-btn" data-i18n="manage.open">Beheer</button>
  </div>
  <div class="livebar" id="livebar">
    <span class="livedot" id="livedot" aria-hidden="true"></span>
    <span id="live-text" data-i18n="live.loading">Laden…</span>
  </div>
</header>

<nav class="tabs" id="tabs" role="tablist">
  <button class="tab" data-view="matrix" data-i18n="view.matrix">Matrix</button>
  <button class="tab" data-view="towork" data-i18n="view.towork">Nog te werken</button>
  <button class="tab" data-view="band" data-i18n="view.band">Per band</button>
  <button class="tab" data-view="station" data-i18n="view.station">Per station</button>
  <button class="tab" data-view="sources" data-i18n="view.sources">Per bron-PC</button>
  <button class="tab" data-view="stats" data-i18n="view.stats">Statistiek</button>
</nav>

<section class="filters" id="filters">
  <input type="search" id="f-search" class="f-search mono"
         data-i18n-placeholder="filter.search" placeholder="Zoek roepnaam…">
  <select id="f-status">
    <option value="all" data-i18n="filter.status.all">Alle statussen</option>
    <option value="worked" data-i18n="filter.status.worked">Gewerkt</option>
    <option value="open" data-i18n="filter.status.open">Niet gewerkt</option>
    <option value="partial" data-i18n="filter.status.partial">Deels gewerkt</option>
  </select>
  <select id="f-band"></select>
  <select id="f-category"></select>
  <select id="f-section"></select>
</section>

<main id="view-root">
  <div class="empty" data-i18n="live.loading">Laden…</div>
</main>

<aside class="detail" id="detail" hidden>
  <div class="detail-head">
    <strong id="detail-title" class="mono"></strong>
    <button id="detail-close" class="detail-close" aria-label="Close">×</button>
  </div>
  <div id="detail-body"></div>
</aside>

<div class="drawer-backdrop" id="drawer-backdrop" hidden></div>
<aside class="drawer" id="manual-drawer" hidden aria-label="Manual">
  <div class="drawer-head">
    <strong data-i18n="manual.title">Beknopte handleiding</strong>
    <button id="manual-close" class="detail-close" aria-label="Close">×</button>
  </div>
  <div id="manual-body" class="manual-body"></div>
</aside>

<aside class="drawer" id="manage-drawer" hidden aria-label="Field day management">
  <div class="drawer-head">
    <strong data-i18n="manage.title">Velddagbeheer</strong>
    <button id="manage-close" class="detail-close" aria-label="Close">×</button>
  </div>
  <div id="manage-body"></div>
</aside>

<footer class="legend" id="legend"></footer>

<script src="app.js"></script>
</body>
</html>
